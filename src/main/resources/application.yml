spring:
  activemq:
    in-memory: false
    broker-url: ${SPRING_ACTIVEMQ_BROKER_URL:tcp://activemq:61616}
    user: ${SPRING_ACTIVEMQ_USER:admin}
    password: ${SPRING_ACTIVEMQ_PASSWORD:admin}
  mail:
    host: ${SPRING_MAIL_HOST:mailhog}
    port: ${SPRING_MAIL_PORT:1025}

activemq:
  destination: ${ACTIVEMQ_DESTINATION:email}

email:
  from: ${EMAIL_FROM:awesome@testing.com}

server:
  port: 4002
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: false
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
